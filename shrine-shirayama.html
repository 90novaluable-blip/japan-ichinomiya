<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shirayama Hime Shrine — Ichinomiya of Kaga Province</title>
<style>
:root {
  --red: #9b2335;
  --gold: #c9a84c;
  --ink: #1a1a2e;
  --cream: #fdf6ec;
  --mist: #f0ebe3;
  --gray: #6b6b6b;
  --green: #2e7d32;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Georgia',serif; background:var(--cream); color:var(--ink); line-height:1.75; }

/* ── HEADER ── */
header {
  background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; position:sticky; top:0; z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
.logo { display:flex; align-items:baseline; gap:10px; text-decoration:none; }
.logo .kanji { font-size:1.5rem; color:var(--gold); font-weight:bold; }
.logo .sub { font-size:0.78rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; }
.header-right { display:flex; align-items:center; gap:16px; }
nav a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.78rem; letter-spacing:0.08em; margin-left:20px; }
nav a:hover { color:var(--gold); }
.lang-switcher { display:flex; gap:4px; }
.lang-btn { font-size:0.7rem; padding:2px 8px; border-radius:10px; text-decoration:none; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); transition:all 0.2s; }
.lang-btn.active { background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:bold; }

/* ── HERO ── */
.hero {
  position:relative; height:88vh; min-height:520px; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:48px; color:#fff; text-align:center;
}
.hero-bg {
  position:absolute; inset:0;
  background:
    linear-gradient(to bottom, rgba(10,5,20,0.3) 0%, rgba(10,5,20,0.1) 40%, rgba(10,5,20,0.75) 100%),
    linear-gradient(135deg, #1a0a0a 0%, #2a1508 40%, #0a1520 100%);
}
.hero-torii { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:900px; opacity:0.12; }
.hero-glow {
  position:absolute; width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.particles { position:absolute; inset:0; overflow:hidden; }
.particle { position:absolute; width:2px; height:2px; background:rgba(201,168,76,0.6); border-radius:50%; animation:float linear infinite; }
@keyframes float { 0%{transform:translateY(100vh) translateX(0);opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-20px) translateX(30px);opacity:0;} }
.hero-content { position:relative; z-index:1; padding:0 20px; }
.hero-badge { display:inline-block; border:1px solid var(--gold); color:var(--gold); font-size:0.7rem; letter-spacing:0.25em; padding:4px 16px; border-radius:20px; margin-bottom:16px; text-transform:uppercase; }
.hero h1 { font-size:clamp(2rem,6vw,4.5rem); font-weight:normal; line-height:1.1; margin-bottom:8px; }
.hero h1 .jp { display:block; font-size:clamp(2.5rem,8vw,5.5rem); color:var(--gold); }
.hero-tagline { font-size:clamp(0.9rem,2vw,1.1rem); color:rgba(255,255,255,0.75); max-width:560px; margin:16px auto 0; font-style:italic; }
.hero-scroll { margin-top:32px; color:rgba(255,255,255,0.3); font-size:0.72rem; letter-spacing:0.2em; animation:pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* ── QUICK FACTS BAR ── */
.quick-bar { background:var(--ink); color:#fff; display:flex; justify-content:center; flex-wrap:wrap; gap:0; }
.quick-item { padding:14px 28px; display:flex; align-items:center; gap:8px; border-right:1px solid rgba(255,255,255,0.1); font-size:0.8rem; }
.quick-item:last-child { border-right:none; }
.quick-icon { font-size:1rem; }
.quick-label { color:rgba(255,255,255,0.45); font-size:0.65rem; display:block; }
.quick-value { color:#fff; font-size:0.85rem; }

/* ── MAIN GRID ── */
.main { max-width:1100px; margin:0 auto; padding:48px 20px 80px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.grid-full { grid-column:1/-1; }

/* ── CARDS ── */
.card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,0.07); border:1px solid rgba(0,0,0,0.06); }
.card-header { padding:18px 24px 14px; border-bottom:1px solid #f0e8d8; display:flex; align-items:center; gap:12px; }
.card-num { width:28px; height:28px; background:var(--red); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:bold; flex-shrink:0; }
.card-title-en { font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); display:block; }
.card-title-jp { font-size:1.05rem; font-weight:bold; display:block; line-height:1.2; }
.card-title-zh { font-size:0.7rem; color:var(--gray); display:block; }
.card-body { padding:20px 24px 24px; }

/* Essence card */
.essence-highlight { background:var(--mist); border-radius:8px; padding:16px 20px; margin-bottom:16px; border-left:3px solid var(--gold); }
.essence-label { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.essence-text { font-size:0.95rem; color:#333; }
.essence-text strong { color:var(--red); }

/* Video embed */
.video-wrapper { position:relative; border-radius:8px; overflow:hidden; background:var(--ink); margin-top:16px; }
.video-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); display:flex; align-items:center; justify-content:center; }
.play-btn { width:56px; height:56px; border-radius:50%; background:rgba(201,168,76,0.9); display:flex; align-items:center; justify-content:center; text-decoration:none; transition:transform 0.2s, background 0.2s; font-size:1.3rem; color:var(--ink); }
.play-btn:hover { transform:scale(1.1); background:var(--gold); }
.video-caption { position:absolute; bottom:0; left:0; right:0; padding:10px 14px; color:rgba(255,255,255,0.8); font-size:0.75rem; }

/* Map card */
.map-wrapper { border-radius:8px; overflow:hidden; margin-bottom:16px; }
.map-wrapper iframe { width:100%; height:240px; border:none; display:block; }
.map-link { display:flex; align-items:center; gap:8px; background:var(--ink); color:var(--gold); text-decoration:none; padding:10px 16px; border-radius:6px; font-size:0.82rem; letter-spacing:0.08em; margin-bottom:16px; transition:background 0.2s; }
.map-link:hover { background:#2a2a3e; }
.access-list { list-style:none; }
