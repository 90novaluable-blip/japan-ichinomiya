<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ichinomiya — All First Shrines of Japan</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <!-- Leaflet JS -->

  <style>
    :root {
      --red:   #9b2335;
      --gold:  #c9a84c;
      --ink:   #1a1a2e;
      --cream: #fdf6ec;
      --mist:  #f0ebe3;
      --gray:  #6b6b6b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Georgia',serif; background:var(--cream); color:var(--ink); }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 28px;
      position:sticky;
      top:0;
      z-index:1000;
      box-shadow:0 2px 12px rgba(0,0,0,0.4);
    }
    .logo {
      display:flex;
      align-items:baseline;
      gap:12px;
    }
    .logo .kanji { font-size:1.6rem; color:var(--gold); font-weight:bold; }
    .logo .en    { font-size:0.85rem; letter-spacing:0.15em; color:rgba(255,255,255,0.6); }
    nav a {
      color:rgba(255,255,255,0.65);
      text-decoration:none;
      font-size:0.8rem;
      letter-spacing:0.1em;
      margin-left:24px;
      transition:color 0.2s;
    }
    nav a:hover { color:var(--gold); }

    /* ── HERO BAR ── */
    .hero-bar {
      background: linear-gradient(90deg, var(--red) 0%, #6b1020 100%);
      color:#fff;
      text-align:center;
      padding:28px 20px;
    }
    .hero-bar h1 { font-size:clamp(1.3rem,3vw,1.9rem); font-weight:normal; }
    .hero-bar p  { margin-top:6px; font-size:0.9rem; color:rgba(255,255,255,0.75); }

    /* ── FILTER BAR ── */
    .filter-bar {
      background:#fff;
      border-bottom:1px solid #e0d8ce;
      padding:12px 20px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      position:sticky;
      top:57px;
      z-index:999;
    }
    .filter-label {
      font-size:0.72rem;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:var(--gray);
      margin-right:4px;
    }
    .filter-btn {
      border:1px solid #ccc;
      background:#fff;
      border-radius:20px;
      padding:5px 14px;
      font-size:0.78rem;
      cursor:pointer;
      transition:all 0.18s;
      font-family:inherit;
      color:var(--ink);
    }
    .filter-btn:hover   { border-color:var(--red); color:var(--red); }
    .filter-btn.active  { background:var(--red); color:#fff; border-color:var(--red); }
    .shrine-count {
      margin-left:auto;
      font-size:0.78rem;
      color:var(--gray);
    }

    /* ── LAYOUT ── */
    .layout {
      display:grid;
      grid-template-columns:1fr 360px;
      height:calc(100vh - 160px);
      min-height:500px;
    }

    /* ── MAP ── */
    #map {
      height:100%;
      background:#c8e6f5;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      overflow-y:auto;
      border-left:1px solid #e0d8ce;
      background:#fff;
    }
    .sidebar-header {
      padding:16px 20px 12px;
      border-bottom:1px solid #ece5da;
      font-size:0.72rem;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:var(--gray);
      position:sticky;
      top:0;
      background:#fff;
      z-index:10;
    }

    /* Grouped by road */
    .road-group { }
    .road-header {
      background:var(--mist);
      padding:8px 20px;
      font-size:0.7rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--gray);
      border-bottom:1px solid #e0d8ce;
      position:sticky;
      top:38px;
      z-index:5;
    }

    .shrine-item {
      padding:12px 20px;
      border-bottom:1px solid #f0ebe3;
      cursor:pointer;
      transition:background 0.15s;
      display:flex;
      align-items:flex-start;
      gap:10px;
    }
    .shrine-item:hover        { background:#fdf6ec; }
    .shrine-item.highlighted  { background:#fff5e6; border-left:3px solid var(--gold); }

    .shrine-dot {
      flex-shrink:0;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-top:5px;
    }
    .shrine-item-body {}
    .shrine-item-jp   { font-size:0.95rem; font-weight:bold; }
    .shrine-item-en   { font-size:0.78rem; color:var(--gray); margin-top:1px; }
    .shrine-item-pref { font-size:0.72rem; color:#aaa; margin-top:2px; }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.25);
      padding:0;
      overflow:hidden;
    }
    .leaflet-popup-content { margin:0; width:240px !important; }
    .popup-header {
      background:var(--ink);
      color:#fff;
      padding:12px 16px 10px;
    }
    .popup-road {
      font-size:0.65rem;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:4px;
    }
    .popup-jp   { font-size:1.2rem; font-weight:bold; }
    .popup-en   { font-size:0.78rem; color:rgba(255,255,255,0.7); margin-top:2px; }
    .popup-body { padding:12px 16px; }
    .popup-row  { display:flex; gap:8px; margin-bottom:6px; font-size:0.82rem; }
    .popup-icon { color:var(--gold); flex-shrink:0; }
    .popup-deity-label { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray); margin-bottom:2px; }
    .popup-deity { font-size:0.88rem; }
    .popup-link {
      display:block;
      margin-top:10px;
      text-align:center;
      background:var(--red);
      color:#fff;
      padding:8px;
      border-radius:4px;
      text-decoration:none;
      font-size:0.8rem;
      letter-spacing:0.08em;
      transition:background 0.2s;
    }
    .popup-link:hover { background:#7a1a28; }

    /* ── RESPONSIVE ── */
    @media(max-width:700px) {
      .layout { grid-template-columns:1fr; grid-template-rows:55vh 1fr; height:auto; }
      .sidebar { height:45vh; }
    }
  </style>
</head>

// ════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════
const map = L.map('map', {
  center: [36.5, 136.5],
  zoom: 5,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

// ═══════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════
function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="24" height="32">
    <path d="M12 0C7.6 0 4 3.6 4 8c0 6 8 20 8 20s8-14 8-20c0-4.4-3.6-8-8-8z"
          fill="${color}" stroke="#fff" stroke-width="1.5"/>
    <circle cx="12" cy="8" r="3.5" fill="#fff" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [24, 32],
    iconAnchor: [12, 32],
    popupAnchor: [0, -32],
  });
}

let markers = [];
let activeRoad = 'all';

function buildPopup(s) {
  const road = ROADS[s.road];
  return `
    <div class="popup-header">
      <div class="popup-road">${road.jp} · ${road.en}</div>
      <div class="popup-jp">${s.jp}</div>
      <div class="popup-en">${s.en}</div>
    </div>
    <div class="popup-body">
      <div class="popup-deity-label">Enshrined Deity &amp; Domain</div>
      <div class="popup-deity">${s.deity}</div>
      <div class="popup-row" style="margin-top:10px;">
        <span class="popup-icon">�M</span>
        <span>${s.kuni} · ${s.pref} Pref.</span>
      </div>
      <a class="popup-link" href="#">View Details →</a>
    </div>`;
}

function renderMarkers(roadFilter) {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  const filtered = roadFilter === 'all'
    ? shrines
    : shrines.filter(s => s.road === roadFilter);

  filtered.forEach(s => {
    const color = ROADS[s.road].color;
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(color) })
      .bindPopup(buildPopup(s), { maxWidth: 260 })
      .addTo(map);

    m.on('click', () => {
      highlightSidebarItem(s.id);
    });

    markers.push({ marker: m, shrine: s });
  });

  document.getElementById('shrineCount').textContent =
    `${filtered.length} shrine${filtered.length !== 1 ? 's' : ''}`;

  renderSidebar(roadFilter);
}

// ════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════
function renderSidebar(roadFilter) {
  const list = document.getElementById('shrineList');
  list.innerHTML = '';

  const filtered = roadFilter === 'all'
    ? shrines
    : shrines.filter(s => s.road === roadFilter);

  // Group by road
  const groups = {};
  filtered.forEach(s => {
    if (!groups[s.road]) groups[s.road] = [];
    groups[s.road].push(s);
  });

  Object.entries(groups).forEach(([roadKey, items]) => {
    const road = ROADS[roadKey];
    const header = document.createElement('div');
    header.className = 'road-header';
    header.textContent = `${road.jp}  ${road.en}`;
    list.appendChild(header);

    items.forEach(s => {
      const div = document.createElement('div');
      div.className = 'shrine-item';
      div.dataset.id = s.id;
      div.innerHTML = `
        <div class="shrine-dot" style="background:${ROADS[s.road].color}"></div>
        <div class="shrine-item-body">
          <div class="shrine-item-jp">${s.jp}</div>
          <div class="shrine-item-en">${s.en}</div>
          <div class="shrine-item-pref">${s.kuni} · ${s.pref}</div>
        </div>`;
      div.addEventListener('click', () => {
        const marker = markers.find(m => m.shrine.id === s.id);
        if (marker) {
          map.setView([s.lat, s.lng], 10, { animate: true });
          marker.marker.openPopup();
          highlightSidebarItem(s.id);
        }
      });
      list.appendChild(div);
    });
  });
}

function highlightSidebarItem(id) {
  document.querySelectorAll('.shrine-item').forEach(el => {
    el.classList.toggle('highlighted', +el.dataset.id === id);
  });
  const el = document.querySelector(`.shrine-item[data-id="${id}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ═══════════════════════════════════════════
// FILTER BUTTONS
// ════════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRoad = btn.dataset.road;
    renderMarkers(activeRoad);
  });
});

// Initial render
renderMarkers('all');
</script>
